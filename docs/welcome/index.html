<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Pin DXF File Viewer in Chrome and open DXF drawings faster."
    />
    <title>DXF File Viewer is ready</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar" aria-label="DXF File Viewer">
        <span class="app-icon" aria-hidden="true"></span>
        <span class="topbar__name">DXF File Viewer</span>
      </header>

      <section class="hero" aria-labelledby="welcome-title">
        <p class="eyebrow">Installed successfully</p>
        <h1 id="welcome-title">Pin DXF File Viewer for quick access</h1>
        <p class="subtitle">
          Click the puzzle icon, then pin DXF File Viewer.
        </p>
      </section>

      <section class="steps" aria-label="How to pin DXF File Viewer">
        <figure class="step" aria-label="Click the puzzle icon, then pin DXF File Viewer">
          <div class="browser browser--menu">
            <div class="chrome-frame">
              <div class="traffic-lights">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <div class="tab">
                <span class="app-icon app-icon--tiny"></span>
                <span>DXF File Viewer</span>
                <span class="tab__close">×</span>
              </div>
              <span class="new-tab">+</span>
            </div>

            <div class="toolbar">
              <span class="nav">←</span>
              <span class="nav">→</span>
              <span class="nav">↻</span>
              <div class="address">Search Google or type a URL</div>
              <span class="toolbar-icon">☆</span>
              <span class="toolbar-icon toolbar-icon--puzzle">♣</span>
              <span class="toolbar-icon">A</span>
              <span class="toolbar-icon">⋮</span>
            </div>

            <div class="mock-page">
              <div class="mock-page__copy">
                <span class="app-icon"></span>
                <h2>DXF File Viewer</h2>
                <p>Open and view DXF files instantly in your browser.</p>
                <div class="drop-card">
                  <span class="file-glyph"></span>
                  <span>Drag &amp; drop a DXF file here<br />or click to open</span>
                </div>
              </div>
            </div>

            <div class="extensions-menu">
              <div class="extensions-menu__title">
                <span>Extensions</span>
                <span>×</span>
              </div>
              <strong>No access needed</strong>
              <p>These extensions don’t need to see and change information on this site.</p>
              <div class="extension-row">
                <span class="app-icon app-icon--small"></span>
                <span>DXF File Viewer</span>
                <span class="pin-icon">♙</span>
                <span class="kebab">⋮</span>
              </div>
            </div>

            <span class="arrow arrow--one">➜</span>
            <span class="badge badge--one">1</span>
            <span class="arrow arrow--two">➜</span>
            <span class="badge badge--two">2</span>
          </div>
        </figure>

        <p class="step-caption">
          Then click the pinned icon whenever you want to open a DXF file.
        </p>

        <figure class="step" aria-label="Click the pinned DXF File Viewer icon">
          <div class="browser browser--pinned">
            <div class="chrome-frame">
              <div class="traffic-lights">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <div class="tab">
                <span class="app-icon app-icon--tiny"></span>
                <span>DXF File Viewer</span>
                <span class="tab__close">×</span>
              </div>
              <span class="new-tab">+</span>
            </div>

            <div class="toolbar">
              <span class="nav">←</span>
              <span class="nav">→</span>
              <span class="nav">↻</span>
              <div class="address">Search Google or type a URL</div>
              <span class="toolbar-icon">☆</span>
              <span class="toolbar-icon toolbar-icon--app">
                <span class="app-icon app-icon--tiny"></span>
              </span>
              <span class="toolbar-icon toolbar-icon--puzzle">♣</span>
              <span class="toolbar-icon">A</span>
              <span class="toolbar-icon">⋮</span>
            </div>

            <div class="mock-page mock-page--wide">
              <div class="mock-page__copy">
                <span class="app-icon"></span>
                <h2>DXF File Viewer</h2>
                <p>Open and view DXF files instantly in your browser.</p>
                <div class="drop-card">
                  <span class="file-glyph file-glyph--dxf">DXF</span>
                  <span>Drag &amp; drop a DXF file here<br />or click to open</span>
                </div>
              </div>
            </div>

            <span class="arrow arrow--three">➜</span>
            <span class="badge badge--three">3</span>
            <span class="highlight-ring"></span>
          </div>
        </figure>
      </section>

      <footer class="privacy-note">
        Your drawings stay on your device. DXF files are processed locally in
        your browser.
      </footer>
    </main>
  </body>
</html>
