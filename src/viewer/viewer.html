<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DXF File Viewer</title>
    <link rel="stylesheet" href="./viewer.css" />
  </head>
  <body>
    <main class="viewer">
      <header class="topbar">
        <div class="topbar-left">
          <span id="fileName" class="file-name">No file</span>
          <span id="fileSize" class="file-size"></span>
        </div>
        <div class="recent-wrap">
          <button
            id="recentToggle"
            type="button"
            class="ghost-btn"
            aria-label="Recent files"
            aria-expanded="false"
          >
            Recent ▾
          </button>
          <div id="recentMenu" class="recent-menu hidden" role="menu">
            <p id="recentEmpty" class="recent-empty">No recent files</p>
            <ul id="recentList" class="recent-list"></ul>
          </div>
        </div>
        <button
          id="themeToggle"
          type="button"
          class="ghost-icon-btn"
          aria-label="Toggle theme"
          title="Toggle theme"
        >
          <svg class="theme-sun" viewBox="0 0 20 20" aria-hidden="true">
            <circle
              cx="10"
              cy="10"
              r="3.4"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
            />
            <path
              d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
            />
          </svg>
          <svg class="theme-moon" viewBox="0 0 20 20" aria-hidden="true">
            <path
              d="M14 11.5A6 6 0 0 1 8.5 6c0-.9.2-1.7.5-2.5A6.5 6.5 0 1 0 16.5 11c-.8.3-1.6.5-2.5.5z"
              fill="currentColor"
            />
          </svg>
        </button>
        <button id="openAnother" type="button" class="ghost-btn">
          Open another
        </button>
      </header>

      <section class="content">
        <button
          id="sidebarToggle"
          type="button"
          class="sidebar-toggle"
          aria-label="Collapse layers panel"
          aria-expanded="true"
        >
          <svg class="chevron" viewBox="0 0 16 16" aria-hidden="true">
            <path
              d="M10 4L6 8l4 4"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <aside id="sidebar" class="sidebar">
          <div class="sidebar-body">
            <div class="search-wrap">
              <input
                id="layerSearch"
                class="search-input"
                type="search"
                placeholder="Filter layers"
                autocomplete="off"
                spellcheck="false"
              />
            </div>
            <ul id="layers" class="layers"></ul>
            <p id="layersEmpty" class="muted hidden">No layers in this drawing</p>
          </div>
        </aside>

        <div id="canvasHost" class="canvas-host">
          <button
            id="fit"
            type="button"
            class="floating-btn"
            aria-label="Fit to screen"
            title="Fit to screen"
          >
            <svg viewBox="0 0 20 20" aria-hidden="true">
              <path
                d="M3 7V3h4M17 7V3h-4M3 13v4h4M17 13v4h-4"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <div id="coordReadout" class="coord-readout hidden" aria-hidden="true">
            <span id="coordX">X: 0.00</span>
            <span id="coordY">Y: 0.00</span>
          </div>

          <div id="dropOverlay" class="drop-overlay hidden">
            <div class="drop-overlay-card">
              <p>Drop to open in a new tab</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-card">
        <div id="overlaySpinner" class="spinner"></div>
        <p id="overlayText">Loading drawing…</p>
        <button
          id="overlayAction"
          type="button"
          class="ghost-btn hidden"
        >
          Open another file
        </button>
      </div>
    </div>

    <input id="fileInput" class="hidden-input" type="file" accept=".dxf" />
    <script type="module" src="./viewer.ts"></script>
  </body>
</html>
